<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Equalizer Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #fff; }
        
        /* Custom Vertical Sliders */
        input[type=range] {
            writing-mode: vertical-lr;
            direction: rtl;
            appearance: slider-vertical;
            width: 8px;
            height: 200px;
            vertical-align: bottom;
            accent-color: #e11d48; /* Red/Pink from FxSound */
            cursor: pointer;
        }
        
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center font-sans">

    <div class="bg-[#121212] p-8 rounded-xl shadow-2xl border border-gray-800 w-full max-w-4xl">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold tracking-wider flex items-center gap-3">
                <span class="text-rose-600">ılı.</span> System EQ
            </h1>
            <div id="status" class="px-3 py-1 rounded-full text-xs font-semibold bg-red-900/30 text-red-500 border border-red-800">
                Disconnected
            </div>
        </div>

        <!-- Equalizer Sliders -->
        <div class="flex justify-between px-4 mt-12 bg-[#0a0a0a] rounded-lg p-6 border border-gray-800">
            <script>
                const frequencies = [22, 44, 240, 397, 735, 1360, 2520, 4670, 9100, 16000];
                
                // Establish WebSocket to Rust Backend (gracefully handling secure environment restrictions)
                let ws;
                try {
                    ws = new WebSocket("ws://127.0.0.1:3030");
                    
                    ws.onopen = () => {
                        document.getElementById('status').innerText = "Connected to Engine";
                        document.getElementById('status').className = "px-3 py-1 rounded-full text-xs font-semibold bg-green-900/30 text-green-500 border border-green-800";
                    };

                    ws.onclose = () => {
                        document.getElementById('status').innerText = "Engine Offline";
                        document.getElementById('status').className = "px-3 py-1 rounded-full text-xs font-semibold bg-red-900/30 text-red-500 border border-red-800";
                    };
                    
                    ws.onerror = (e) => {
                        console.warn("WebSocket error (ensure Rust backend is running locally):", e);
                    };
                } catch (e) {
                    console.warn("WebSockets to localhost are restricted in this preview environment. Open this file locally to connect to the engine.");
                    document.getElementById('status').innerText = "Preview Mode (Offline)";
                }

                function updateGain(bandIndex, gainValue) {
                    // Update UI label
                    document.getElementById(`label-${bandIndex}`).innerText = gainValue > 0 ? `+${gainValue}` : gainValue;
                    
                    // Send to Rust Backend instantly
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ band: bandIndex, gain: parseFloat(gainValue) }));
                    }
                }

                // Generate the 10 bands dynamically based on the frequencies
                frequencies.forEach((freq, index) => {
                    let freqLabel = freq >= 1000 ? (freq/1000).toFixed(2) + ' kHz' : freq + ' Hz';
                    
                    document.write(`
                        <div class="slider-container group">
                            <span id="label-${index}" class="text-xs text-gray-400 font-mono group-hover:text-rose-500 transition-colors">0</span>
                            <input 
                                type="range" 
                                min="-12" max="12" step="1" value="0"
                                oninput="updateGain(${index}, this.value)"
                            >
                            <span class="text-[10px] text-gray-500 font-mono">${freqLabel}</span>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="mt-6 text-center text-sm text-gray-500">
            Make sure your Windows output is set to <strong>CABLE Input</strong> and run <code class="bg-gray-800 px-2 py-1 rounded">cargo run</code> in the backend.
        </div>
    </div>

</body>
</html>
