<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Equalizer Engine - Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #fff; }
        
        /* Custom Vertical Sliders for EQ */
        input[type=range].eq-slider {
            writing-mode: vertical-lr;
            direction: rtl;
            appearance: slider-vertical;
            width: 8px;
            height: 180px;
            vertical-align: bottom;
            accent-color: #e11d48;
            cursor: pointer;
        }

        /* Custom Horizontal Sliders for Boost & Clarity */
        input[type=range].fx-slider {
            width: 100%;
            height: 6px;
            accent-color: #f43f5e;
            cursor: pointer;
        }
        
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center font-sans p-6">

    <div class="bg-[#121212] p-8 rounded-xl shadow-2xl border border-gray-800 w-full max-w-4xl">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold tracking-wider flex items-center gap-3">
                <span class="text-rose-600">ılı.</span> PRO EQ & FX ENGINE
            </h1>
            <div id="status" class="px-3 py-1 rounded-full text-xs font-semibold bg-red-900/30 text-red-500 border border-red-800">
                Disconnected
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 bg-[#181818] p-6 rounded-lg border border-gray-800 mb-8">
            <div>
                <div class="flex justify-between text-sm mb-2 font-mono">
                    <span class="text-gray-300 font-semibold flex items-center gap-2">🔊 Volume Boost</span>
                    <span id="boost-val" class="text-rose-500 font-bold">0</span>
                </div>
                <input type="range" min="0" max="10" step="0.5" value="0" class="fx-slider" oninput="updateFx('boost', this.value)">
                <p class="text-[11px] text-gray-500 mt-1">Master decibel gain amplification</p>
            </div>

            <div>
                <div class="flex justify-between text-sm mb-2 font-mono">
                    <span class="text-gray-300 font-semibold flex items-center gap-2">✨ Clarity</span>
                    <span id="clarity-val" class="text-rose-500 font-bold">0</span>
                </div>
                <input type="range" min="0" max="10" step="0.5" value="0" class="fx-slider" oninput="updateFx('clarity', this.value)">
                <p class="text-[11px] text-gray-500 mt-1">Crisp vocal presence & bass mud removal</p>
            </div>
        </div>

        <div class="flex justify-between px-4 bg-[#0a0a0a] rounded-lg p-6 border border-gray-800">
            <script>
                const frequencies = [22, 44, 240, 397, 735, 1360, 2520, 4670, 9100, 16000];
                let ws;
                
                try {
                    ws = new WebSocket("ws://127.0.0.1:3030");
                    ws.onopen = () => {
                        document.getElementById('status').innerText = "Connected to Engine";
                        document.getElementById('status').className = "px-3 py-1 rounded-full text-xs font-semibold bg-green-900/30 text-green-500 border border-green-800";
                    };
                    ws.onclose = () => {
                        document.getElementById('status').innerText = "Engine Offline";
                        document.getElementById('status').className = "px-3 py-1 rounded-full text-xs font-semibold bg-red-900/30 text-red-500 border border-red-800";
                    };
                } catch (e) { console.warn("Offline preview"); }

                // Send Volume Boost or Clarity to Rust
                function updateFx(type, value) {
                    document.getElementById(`${type}-val`).innerText = value;
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        let payload = {};
                        payload[type] = parseFloat(value);
                        ws.send(JSON.stringify(payload));
                    }
                }

                // Send 10-Band EQ updates to Rust
                function updateGain(bandIndex, gainValue) {
                    document.getElementById(`label-${bandIndex}`).innerText = gainValue > 0 ? `+${gainValue}` : gainValue;
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ band: bandIndex, gain: parseFloat(gainValue) }));
                    }
                }

                // Generate the 10 EQ bands dynamically
                frequencies.forEach((freq, index) => {
                    let freqLabel = freq >= 1000 ? (freq/1000).toFixed(2) + ' kHz' : freq + ' Hz';
                    document.write(`
                        <div class="slider-container group">
                            <span id="label-${index}" class="text-xs text-gray-400 font-mono group-hover:text-rose-500 transition-colors">0</span>
                            <input 
                                type="range" 
                                min="-12" max="12" step="1" value="0"
                                class="eq-slider"
                                oninput="updateGain(${index}, this.value)"
                            >
                            <span class="text-[10px] text-gray-500 font-mono">${freqLabel}</span>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="mt-6 text-center text-xs text-gray-500 font-mono">
            💡 TIP: Use <strong>Volume Boost</strong> for loudness, and keep your EQ sliders shaped gracefully without maxing them all out!
        </div>
    </div>

</body>
</html>
